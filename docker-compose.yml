services:
  postgres:
    image: postgres:16-alpine
    container_name: devcollab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-devcollab}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devcollab_secret}
      POSTGRES_DB: ${DB_NAME:-devcollab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - devcollab-net

  redis:
    image: redis:7-alpine
    container_name: devcollab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - devcollab-net

  minio:
    image: minio/minio:latest
    container_name: devcollab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - devcollab-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devcollab-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-devcollab}:${DB_PASSWORD:-devcollab_secret}@postgres:5432/${DB_NAME:-devcollab}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin_secret
      S3_BUCKET: devcollab-files
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://192.168.10.122:3000}
      ANNOUNCED_IP: ${ANNOUNCED_IP:-192.168.10.122}
    ports:
      - "4000:4000"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    networks:
      - devcollab-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: devcollab-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:443"   # HTTPS (mic/voice requires secure context)
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks:
      - devcollab-net

networks:
  devcollab-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
